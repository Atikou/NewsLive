      function formatDate(value) {

      function buildKeywordButtons() {
        const allKeywords = ["__ALL__", ...(state.data.keywords || [])];
        keywordButtons.innerHTML = "";
        for (const keyword of allKeywords) {
          const btn = document.createElement("button");
          btn.textContent = keyword === "__ALL__" ? "全部关键词" : keyword;
          btn.className = keyword === state.selectedKeyword ? "active" : "";
          btn.onclick = () => { state.selectedKeyword = keyword; buildKeywordButtons(); renderList(); };
          keywordButtons.appendChild(btn);
        }
      }

      function renderStatus() {
        const d = state.data;
        statusEl.textContent =
          "最近构建: " + formatDate(d.generatedAt) +
          " | 上次获取: " + formatDate(d.lastFetchAt) +
          " | 下次获取(计划): " + formatDate(d.nextFetchAt) +
          " | 总条数: " + ((d.items || []).length);

      function getHealthLabel(status) {

        return "🟠 其他问题";
      }

        const filters = [

          { id: "success", label: "🟢 成功" },
          { id: "failed", label: "🔴 失败" },
          { id: "other", label: "🟠 其他" }

        healthFiltersEl.innerHTML = filters

          .join("");
        for (const btn of healthFiltersEl.querySelectorAll("button[data-health-filter]")) {
          btn.addEventListener("click", () => {
            state.sourceHealthFilter = btn.getAttribute("data-health-filter");
            renderHealthPanel();
          });
        }
        const filtered = sourceHealth.filter((item) => state.sourceHealthFilter === "__ALL__" || item.status === state.sourceHealthFilter);
        healthListEl.innerHTML = filtered.length
