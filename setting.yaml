# 抓取间隔（分钟）
fetch_interval_minutes: 30

# 任何抓取（含手动刷新）最短间隔（分钟）
min_fetch_interval_minutes: 2

# 请求超时（秒）
request_timeout_seconds: 60

# 暂停抓取时间段（命中后不抓取、不推送）
# 格式：时-分 to 时-分（24小时制）
# 支持跨天，例如 23-30 to 07-00
pause_time_ranges: []
# pause_time_ranges:
#   - 12-00 to 13-30
#   - 23-30 to 07-00

# AI 标题翻译（Anthropic Messages API 兼容）
ai_translation:
  # 是否启用标题翻译（翻译为中文）
  enabled: true
  # 每次抓取最多翻译多少条标题
  max_items_per_run: 200
  # 单次请求批量翻译条数
  batch_size: 8
  # 翻译请求超时（秒）
  request_timeout_seconds: 60
  # 仅翻译非中文标题
  only_non_chinese: true
  # anthropic-version 请求头
  anthropic_version: "2023-06-01"
  # 额外请求头（对接某些 Anthropic 兼容网关时可用）
  headers: {}

push:
  # 是否启用重点内容推送
  enabled: true

  # 同一条内容再次允许推送的间隔（分钟）
  repeat_interval_minutes: 1440

  # 通知历史清理 TTL（分钟）：超过此时间后会从 notified-history.json 中移除记录
  notify_history_ttl_minutes: 1440

  # 重点推送来源黑名单（填写来源名称；命中来源将不会推送）
  # 来源名称可在页面里每条新闻的“来源”字段查看
  source_blacklist: []
  # source_blacklist:
  #   - 微博热搜
  #   - 知乎热榜

  # 单次推送最多包含多少条重点内容
  max_items_per_push: 15
  # 单次推送消息最大字符大小（4KB）
  max_message_chars: 4096

ui:
  # 前端轮询间隔（秒）
  poll_interval_seconds: 15
