    max_items: 120

  - id: ap_top_news
    name: AP Top News
    type: html_links
    url: https://apnews.com/hub/ap-top-news
    min_title_length: 8
    max_items: 120

  - id: reuters_world_rss
    name: Reuters World News
    type: rss
    url: https://www.reuters.com/world/rss
    min_title_length: 6
    max_items: 120

  - id: guardian_world_rss
    name: Guardian World
    type: rss
    url: https://www.theguardian.com/world/rss
    min_title_length: 6
    max_items: 120

  - id: google_news_rss
    name: Google News
    type: rss
    url: https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en
    min_title_length: 6
    max_items: 120

  - id: hn_cn
    name: HackerNews 中文版
    type: html_links
    url: https://hn.aimaker.dev/
    min_title_length: 8
    max_items: 120

  - id: propublica_home
    name: ProPublica
    type: html_links
    url: https://www.propublica.org/
    min_title_length: 8
    max_items: 80

  - id: propublica_topics
    name: ProPublica Topics
    type: html_links
    url: https://www.propublica.org/topics
    min_title_length: 8
    max_items: 120

  - id: hn_rss_frontpage
    name: Hacker News Frontpage
    type: rss
    url: https://hnrss.org/frontpage
    min_title_length: 6
    max_items: 120

  - id: hn_rss_newest
    name: Hacker News Newest
    type: rss
    url: https://hnrss.org/newest
    min_title_length: 6
    max_items: 120

  - id: lobsters_rss
    name: Lobsters RSS
    type: rss
    url: https://lobste.rs/rss
    min_title_length: 6
    max_items: 120

  - id: hn_algolia_frontpage
    name: Hacker News Algolia Front Page
    type: json_items
    url: https://hn.algolia.com/api/v1/search?tags=front_page
    items_path: hits
    title_paths:
      - title
      - story_title
    url_paths:
      - url
      - story_url
    id_paths:
      - objectID
    date_paths:
      - created_at
    min_title_length: 6
    max_items: 100

  - id: hn_algolia_ai
    name: Hacker News Algolia AI Search
    type: json_items
    url: https://hn.algolia.com/api/v1/search_by_date?query=AI&tags=story
    items_path: hits
    title_paths:
      - title
      - story_title
    url_paths:
      - url
      - story_url
    id_paths:
      - objectID
    date_paths:
      - created_at
    min_title_length: 6
    max_items: 100